name: Validate

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.9

      - name: Setup Ansible
        run: pip install ansible ansible-lint

      - name: Setup Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash -s -- 5.0
          mv kustomize /usr/local/bin/

      - name: Setup SOPS
        run: |
          wget -q https://github.com/getsops/sops/releases/download/v3.8.0/sops_3.8.0_amd64.deb
          dpkg -i sops_3.8.0_amd64.deb || apt-get install -f -y

      - name: Setup Trivy
        run: |
          curl -L https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz -o /tmp/trivy.tar.gz
          tar -xzf /tmp/trivy.tar.gz -C /tmp
          mv /tmp/trivy /usr/local/bin/trivy
          rm /tmp/trivy.tar.gz

      - name: Setup checkov
        run: pip install checkov

      - name: Validate Terraform
        run: |
          for dir in terraform/*/; do
            tofu init "$dir"
            tofu validate "$dir"
          done

      - name: Run Trivy
        run: trivy config terraform/

      - name: Run checkov
        run: checkov -d terraform/ --config-file terraform/.checkov.yml

      - name: Validate Ansible
        run: |
          ansible-playbook --syntax-check ansible/playbooks/*.yaml
          ansible-lint ansible/playbooks/*.yaml -c ansible

      - name: Validate Kustomize
        run: |
          kustomize build clusters/production
          kustomize build apps/production
          kustomize build infrastructure/production