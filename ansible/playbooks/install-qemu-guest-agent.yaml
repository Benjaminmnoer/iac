---
- name: Install QEMU Guest Agent and shuts down VMs
  hosts: proxmox
  tasks:
    - name: Install QEMU guest agent from apt
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
        update_cache: true
    - name: Enable and start QEMU guest agent service
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
    - name: Shutdown the VM
      community.general.shutdown:
        delay: 60
