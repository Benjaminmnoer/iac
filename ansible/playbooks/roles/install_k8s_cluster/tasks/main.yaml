---
- name: Check if Gateway CRDs are already installed
  ansible.builtin.command: kubectl get gatewayclass gateway
  register: install_k8s_cluster_gateway_crd_check
  changed_when: false
  failed_when: false
  tags:
    - cluster

- name: Install Gateway API CRDs
  ansible.builtin.command:
    cmd: kubectl apply -f "{{ item }}"
  loop: "{{ install_k8s_cluster_gateway_crd_urls }}"
  when: install_k8s_cluster_gateway_crd_check.rc != 0
  changed_when: false
  tags:
    - cluster

- name: Check if Cilium is already installed
  kubernetes.core.helm_info:
    name: cilium
    release_namespace: "{{ install_k8s_cluster_cilium_namespace }}"
  register: install_k8s_cluster_cilium_installed
  failed_when: false
  changed_when: false
  tags:
    - cluster

- name: Install Cilium using Helm
  kubernetes.core.helm:
    name: cilium
    chart_ref: oci://quay.io/cilium/charts/cilium
    release_namespace: "{{ install_k8s_cluster_cilium_namespace }}"
    create_namespace: true
    update_repo_cache: true
    chart_version: "{{ install_k8s_cluster_cilium_version }}"
    set_values:
      - value: ipam.mode=kubernetes
      - value: kubeProxyReplacement=true
      - value: >-
          securityContext.capabilities.ciliumAgent="{CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}"
      - value: securityContext.capabilities.cleanCiliumState="{NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}"
      - value: cgroup.autoMount.enabled=false
      - value: cgroup.hostRoot=/sys/fs/cgroup
      - value: gatewayAPI.enabled=true
      - value: gatewayAPI.enableAlpn=true
      - value: gatewayAPI.enableAppProtocol=true
      - value: l2announcements.enabled=true
      - value: k8sClientRateLimit.qps=10
      - value: k8sClientRateLimit.burst=20
      - value: securityContext.privileged=true
  when: install_k8s_cluster_cilium_installed.status is not defined or install_k8s_cluster_cilium_installed.status.status != "deployed"
  tags:
    - cluster

- name: Verify Cilium is running
  ansible.builtin.command: cilium-cli status --wait
  register: install_k8s_cluster_cilium_status
  changed_when: false
  failed_when: install_k8s_cluster_cilium_status.rc != 0
  retries: 10
  delay: 30
  until: install_k8s_cluster_cilium_status.rc == 0
  tags:
    - verify

- name: DNS resolution test
  ansible.builtin.command: >-
    kubectl run -it --rm --restart=Never --image=busybox dns-test -- nslookup google.com
  register: install_k8s_cluster_dns_test
  changed_when: false
  ignore_errors: true
  tags:
    - verify

- name: Get cluster info
  ansible.builtin.command: kubectl cluster-info
  register: install_k8s_cluster_cluster_info
  changed_when: false
  failed_when: install_k8s_cluster_cluster_info.rc != 0
  tags:
    - verify

- name: Get cluster nodes
  ansible.builtin.command: kubectl get nodes -o wide
  register: install_k8s_cluster_cluster_nodes
  changed_when: false
  failed_when: install_k8s_cluster_cluster_nodes.rc != 0
  tags:
    - verify

- name: Get all namespaces
  ansible.builtin.command: kubectl get namespaces
  register: install_k8s_cluster_namespaces
  changed_when: false
  failed_when: install_k8s_cluster_namespaces.rc != 0
  tags:
    - verify
