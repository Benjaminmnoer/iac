---
- name: Setup Local Talos Kubernetes Cluster with Cilium (Helm + CLI) and Flux CD
  hosts: localhost
  vars_prompt:
    - name: github_pat
      prompt: "Github PAT"
      private: true
  vars:
    talos_version: "1.10.3"
    kubernetes_version: "1.33.1"
    hubble_version: "1.17.5"
    cluster_name: "Istari"
    flux_git_repo: "https://github.com/benjaminmnoer/iac.git"
    flux_git_owner: "benjaminmnoer"
    flux_git_branch: "master"
    flux_git_path: "clusters/staging"
    gateway_api_version: "v1.2.0"
    cilium_version: "1.17.5"
    key_fp: "6B021152E518C20179D5558C51DE92958775C0C2"
    smb_share_path: "/Storage/smb-share"
    smb_share_name: "Shares"
    smb_username: "test"
    smb_password: ""
    gateway_api_base_url: >-
      https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/{{ gateway_api_version }}/config/crd
    gateway_crd_urls:
      - "{{ gateway_api_base_url }}/standard/gateway.networking.k8s.io_gatewayclasses.yaml"
      - "{{ gateway_api_base_url }}/standard/gateway.networking.k8s.io_gateways.yaml"
      - "{{ gateway_api_base_url }}/standard/gateway.networking.k8s.io_httproutes.yaml"
      - "{{ gateway_api_base_url }}/standard/gateway.networking.k8s.io_referencegrants.yaml"
      - "{{ gateway_api_base_url }}/standard/gateway.networking.k8s.io_grpcroutes.yaml"
      - "{{ gateway_api_base_url }}/experimental/gateway.networking.k8s.io_tlsroutes.yaml"

  tasks:
    - name: Check if talosctl is already installed
      ansible.builtin.command: which talosctl
      register: talosctl_check
      changed_when: false
      failed_when: false

    - name: Check if cilium-cli is already installed
      ansible.builtin.command: which cilium-cli
      register: cilium_cli_check
      changed_when: false
      failed_when: false

    - name: Check if kubectl is already installed
      ansible.builtin.command: which kubectl
      register: kubectl_check
      changed_when: false
      failed_when: false

    - name: Check if helm is already installed
      ansible.builtin.command: which helm
      register: helm_check
      changed_when: false
      failed_when: false

    - name: Check if flux is already installed
      ansible.builtin.command: which flux
      register: flux_check
      changed_when: false
      failed_when: false

    - name: Update system packages
      become: true
      community.general.pacman:
        update_cache: true
        upgrade: true
      when: ansible_facts.os_family == "Archlinux"

    - name: Install required pacman packages
      become: true
      community.general.pacman:
        name:
          - docker
          - kubectl
          - fluxcd
          - helm
          - jq
          - wget
          - python-kubernetes
        state: present
      when: ansible_facts.os_family == "Archlinux"

    - name: Install cilium-cli
      become: true
      ansible.builtin.unarchive:
        src: >-
          https://github.com/cilium/cilium-cli/releases/download/v{{ hubble_version }}/cilium-linux-amd64.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
        owner: root
        group: root
      when: cilium_cli_check.rc != 0
      notify: Restart cilium-cli cache

    - name: Download Hubble
      ansible.builtin.get_url:
        url: >-
          https://github.com/cilium/hubble/releases/download/v{{ hubble_version }}/hubble-linux-amd64.tar.gz
        dest: /tmp/hubble-linux-amd64.tar.gz
        mode: "u=rwx,g=rx,o=rx"
        owner: root
        group: root
        checksum: >-
          sha256:{{ lookup('url',
          'https://github.com/cilium/hubble/releases/download/v' + hubble_version +
          '/hubble-linux-amd64.tar.gz.sha256sum').split()[0] }}
      when: not ansible.builtin.path_exists('/usr/local/bin/hubble')

    - name: Install Hubble
      become: true
      ansible.builtin.unarchive:
        src: /tmp/hubble-linux-amd64.tar.gz
        dest: /usr/local/bin
        remote_src: true
        mode: "0755"
      when: not ansible.builtin.path_exists('/usr/local/bin/hubble')

    - name: Download talosctl checksums
      ansible.builtin.get_url:
        url: >-
          https://github.com/siderolabs/talos/releases/download/v{{ talos_version }}/sha256sum.txt
        dest: /tmp/talosctl-sha256sum.txt
        mode: "u=rwx,g=rx,o=rx"

    - name: Install talosctl
      become: true
      ansible.builtin.get_url:
        url: >-
          https://github.com/siderolabs/talos/releases/download/v{{ talos_version }}/talosctl-linux-amd64
        dest: /usr/local/bin/talosctl
        checksum: >-
          sha256:{{ lookup('file', '/tmp/talosctl-sha256sum.txt').splitlines() |
          select('match', '.*talosctl-linux-amd64$') | map('split') |
          map('first') | list | first }}
        owner: root
        group: root
        mode: "u=rwx,g=rx,o=rx"
      when: talosctl_check.rc != 0

    - name: Check if Gateway CRDs are already installed
      ansible.builtin.command: kubectl get gatewayclass gateway
      register: gateway_crd_check
      changed_when: false
      failed_when: false

    - name: Install gateway CRDs
      ansible.builtin.command:
        cmd: kubectl apply -f "{{ item }}"
      loop: "{{ gateway_crd_urls }}"
      when: gateway_crd_check.rc != 0
      changed_when: false

    - name: Add Cilium Helm repository
      kubernetes.core.helm_repository:
        name: cilium
        repo_url: https://helm.cilium.io
        force_update: true

    - name: Check if Cilium is already installed
      kubernetes.core.helm_info:
        name: cilium
        release_namespace: kube-system
      register: cilium_installed
      failed_when: false

    - name: Install Cilium using Helm
      kubernetes.core.helm:
        name: cilium
        chart_ref: cilium/cilium
        release_namespace: kube-system
        create_namespace: true
        update_repo_cache: true
        chart_version: "{{ cilium_version }}"
        set_values:
          - value: ipam.mode=kubernetes
          - value: kubeProxyReplacement=true
          - value: >-
              securityContext.capabilities.ciliumAgent={CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}
          - value: securityContext.capabilities.cleanCiliumState={NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}
          - value: cgroup.autoMount.enabled=false
          - value: cgroup.hostRoot=/sys/fs/cgroup
          - value: gatewayAPI.enabled=true
          - value: gatewayAPI.enableAlpn=true
          - value: gatewayAPI.enableAppProtocol=true
          - value: l2announcements.enabled=true
          - value: k8sClientRateLimit.qps=10
          - value: k8sClientRateLimit.burst=20
          - value: securityContext.privileged=true
          - value: operator.replicas=1
      when: cilium_installed.status is not defined or cilium_installed.status.status != "deployed"

    - name: Check if SMB container exists
      community.docker.docker_container_info:
        name: smb-server
      register: smb_container_info
      failed_when: false

    - name: Create SMB container
      community.docker.docker_container:
        name: smb-server
        image: instantcontainers/samba:latest
        restart_policy: always
        state: started
        networks:
          - name: "{{ cluster_name }}"
            aliases:
              - "smb-server"
        published_ports:
          - "139:139"
          - "445:445"
        volumes:
          - "{{ smb_share_path }}/:/shares/:z"
        env:
          SAMBA_USERNAME: "{{ smb_username }}"
          SAMBA_PASSWORD: "{{ smb_password }}"
      when: not (smb_container_info.exists | default(false))

    - name: Verify Cilium CLI is working
      ansible.builtin.command: cilium-cli status --wait
      register: cilium_test
      changed_when: false
      failed_when: cilium_test.rc != 0

    - name: DNS test
      ansible.builtin.command: >-
        kubectl run -it --rm --restart=Never --image=busybox dns-test -- nslookup google.com
      register: dns_test
      changed_when: false
      failed_when: dns_test.rc != 0
      ignore_errors: true

    - name: Check if Flux is already bootstrapped
      ansible.builtin.command: flux get all -A
      register: flux_check
      changed_when: false
      failed_when: false

    - name: Bootstrap Flux into Kubernetes
      ansible.builtin.command: >-
        flux bootstrap github
        --owner="{{ flux_git_owner }}"
        --repository="{{ flux_git_repo | regex_replace('.*/([^/]+)\\.git', '\\1') }}"
        --branch="{{ flux_git_branch }}"
        --path="{{ flux_git_path }}"
        --personal
      register: flux_bootstrap
      when: flux_check.rc != 0
      environment:
        GITHUB_TOKEN: "{{ github_pat }}"
      # noqa no-changed-when - idempotency handled by when condition

    - name: Check if SOPS secret already exists
      ansible.builtin.command: kubectl get secret sops-gpg -n flux-system
      register: sops_secret_check
      changed_when: false
      failed_when: false

    - name: Add decryption key
      ansible.builtin.shell: >-
        set -o pipefail &&
        gpg --export-secret-keys --armor "{{ key_fp }}" |
        kubectl create secret generic sops-gpg
        --namespace=flux-system
        --from-file=sops.asc=/dev/stdin
      register: decryption_key
      when: sops_secret_check.rc != 0
      no_log: true
      # noqa no-changed-when - idempotency handled by when condition

  handlers:
    - name: Restart cilium-cli cache
      ansible.builtin.command: cilium-cli status
      changed_when: false
