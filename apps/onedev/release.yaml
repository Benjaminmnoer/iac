apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
    name: onedev
    namespace: onedev
spec:
    releaseName: onedev
    chart:
        spec:
            chart: onedev
            sourceRef:
                kind: HelmRepository
                name: onedev
    interval: 50m
    install:
        remediation:
            retries: 3
    values:
        persistence:
            storageClassName: smb-storage-class
            selector:
                matchLabels:
                    app: onedev
        database:
            external: true
            type: postgresql
            host: 192.168.2.5
            port: "5432"
            name: onedev
            user: onedev_user
            password: dummy-value
            maximumPoolSize: "25"