apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres
spec:
  releaseName: postgres
  chart:
    spec:
      chart: cloudnative-pg
      version: v0.29.0
      sourceRef:
        kind: HelmRepository
        name: postgres
  interval: 50m
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
  values:
    replicaCount: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"