apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres
  namespace: postgres
spec:
  releaseName: postgres
  chart:
    spec:
      chart: cnpg/cloudnative-pg
      version: v0.29.0
      sourceRef:
        kind: HelmRepository
        name: postgres
  interval: 50m
  install:
    remediation:
      retries: 3